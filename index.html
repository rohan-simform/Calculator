<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header text-center">
                        <h4>Scientific Calculator</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <input type="text" id="expr-display" class="form-control mb-1 text-muted" readonly
                                placeholder="expression..." />
                            <input type="text" id="main-display" class="form-control form-control-lg text-end fw-bold"
                                readonly value="0" />
                        </div>

                        <div class="row g-2 mb-2">
                            <div class="col-3"><button class="btn btn-secondary w-100" data-value="sin">sin</button></div>
                            <div class="col-3"><button class="btn btn-secondary w-100" data-value="cos">cos</button></div>
                            <div class="col-3"><button class="btn btn-danger w-100" data-value="C">C</button></div>
                            <div class="col-3"><button class="btn btn-warning w-100" data-value="Backspace"><i class="bi bi-backspace"></i></button></div>
                            <div class="col-3"><button class="btn btn-secondary w-100" data-value="tan">tan</button></div>
                            <div class="col-3"><button class="btn btn-secondary w-100" data-value="log">log</button></div>
                            
                            <div class="col-3"><button class="btn btn-secondary w-100" data-value="ln">ln</button></div>
                            <div class="col-3"><button class="btn btn-secondary w-100" data-value="sqrt">√</button></div>
                            <div class="col-3"><button class="btn btn-secondary w-100" data-value="inv">1/x</button></div>
                            <div class="col-3"><button class="btn btn-secondary w-100" data-value="^">x^y</button></div>
                            
                            <div class="col-3"><button class="btn btn-secondary w-100" data-value="pi">π</button></div>
                            <div class="col-3"><button class="btn btn-secondary w-100" data-value="e">e</button></div>
                            
                        </div>

                        <div class="row g-2 mb-2">
                            <div class="col-3"><button class="btn btn-outline-dark w-100" data-value="7">7</button></div>
                            <div class="col-3"><button class="btn btn-outline-dark w-100" data-value="8">8</button></div>
                            <div class="col-3"><button class="btn btn-outline-dark w-100" data-value="9">9</button></div>
                            <div class="col-3"><button class="btn btn-primary w-100" data-value="/">÷</button></div>

                            <div class="col-3"><button class="btn btn-outline-dark w-100" data-value="4">4</button></div>
                            <div class="col-3"><button class="btn btn-outline-dark w-100" data-value="5">5</button></div>
                            <div class="col-3"><button class="btn btn-outline-dark w-100" data-value="6">6</button></div>
                            <div class="col-3"><button class="btn btn-primary w-100" data-value="*">x</button></div>

                            <div class="col-3"><button class="btn btn-outline-dark w-100" data-value="1">1</button></div>
                            <div class="col-3"><button class="btn btn-outline-dark w-100" data-value="2">2</button></div>
                            <div class="col-3"><button class="btn btn-outline-dark w-100" data-value="3">3</button></div>
                            <div class="col-3"><button class="btn btn-primary w-100" data-value="-">-</button></div>

                            <div class="col-3"><button class="btn btn-outline-dark w-100" data-value=".">.</button></div>
                            <div class="col-3"><button class="btn btn-outline-dark w-100" data-value="0">0</button></div>
                            <div class="col-3"><button class="btn btn-primary w-100" data-value="%">%</button></div>
                            <div class="col-3"><button class="btn btn-primary w-100" data-value="+">+</button></div>
                            <div class="col-12"><button class="btn btn-success w-100" data-value="=">=</button></div>
                        </div>

                        <div>
                            <button class="btn btn-outline-secondary btn-sm mb-2">Show / Hide History</button>
                            <button class="btn btn-outline-danger btn-sm mb-2">Clear History</button>
                            <div id="history-box" style="display:none;" class="border rounded p-2 bg-white" style="max-height:150px; overflow-y:auto;">
                                <ul id="history-list" class="list-unstyled mb-0 small">
                                    <li class="text-muted">No history yet.</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>

</html>
