<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scientific Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="calc-wrap bg-white shadow-sm">
        <div class="bg-white px-3 pt-4 pb-1">
            <div id="expr-display" class="text-end text-muted small"></div>
            <div id="main-display" class="text-end text-dark pb-2">0</div>
        </div>
        <div class="toggle-bar d-flex gap-1 px-3 pb-1 border-bottom">
            <button id="btn-deg" class="active">DEG</button>
            <button id="btn-fe" class="ms-2">F-E</button>
        </div>
        <div class="row g-0 px-2 py-1 border-bottom">
            <div class="col"><button class="mem-btn btn btn-light w-100" id="MC">MC</button></div>
            <div class="col"><button class="mem-btn btn btn-light w-100" id="MR">MR</button></div>
            <div class="col"><button class="mem-btn btn btn-light w-100" id="M+">M+</button></div>
            <div class="col"><button class="mem-btn btn btn-light w-100" id="M-">M-</button></div>
            <div class="col"><button class="mem-btn btn btn-light w-100" id="MS">MS</button></div>
        </div>
        <div class="d-flex align-items-center gap-3 px-2 py-2 border-bottom">
            <div class="dropdown">
                <button class="btn btn-light btn-sm dropdown-toggle border-0 bg-transparent" data-bs-toggle="dropdown">
                    <i class="bi bi-triangle"></i> Trigonometry
                </button>
                <div class="dropdown-menu p-0 shadow-sm">
                    <div class="drop-grid">
                        <button class="drop-key btn btn-light" data-value="sin">sin</button>
                        <button class="drop-key btn btn-light" data-value="cos">cos</button>
                        <button class="drop-key btn btn-light" data-value="tan">tan</button>
                        <button class="drop-key btn btn-light" data-value="sec">sec</button>
                        <button class="drop-key btn btn-light" data-value="csc">csc</button>
                        <button class="drop-key btn btn-light" data-value="cot">cot</button>
                    </div>
                </div>
            </div>
            <div class="dropdown">
                <button class="btn btn-light btn-sm dropdown-toggle border-0 bg-transparent" data-bs-toggle="dropdown">
                    <i class="bi bi-infinity"></i> Function
                </button>
                <div class="dropdown-menu p-0 shadow-sm">
                    <div class="drop-grid cols-2">
                        <button class="drop-key btn btn-light" data-value="floor">floor</button>
                        <button class="drop-key btn btn-light" data-value="ceil">ceil</button>
                        <button class="drop-key btn btn-light" data-value="round">round</button>
                        <button class="drop-key btn btn-light" data-value="cube">x<sup>3</sup></button>
                    </div>
                </div>
            </div>
        </div>
        <div class="px-2 pb-2 pt-1">
            <div class="row g-1">
                <div class="col"><button class="key btn btn-light w-100" data-value="2nd">2<sup>nd</sup></button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="pi">&pi;</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="e">e</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="C">C</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="Backspace"><i class="bi bi-backspace"></i></button></div>

                <div class="col-12"></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="pow">x<sup>2</sup></button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="inv"><sup>1</sup>/x</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="abs">|x|</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="exp">exp</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="mod">mod</button></div>

                <div class="col-12"></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="sqrt"><sup>2</sup>&radic;x</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="(">(</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value=")">)</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="fact"><i>n</i>!</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="/">&divide;</button></div>

                <div class="col-12"></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="^">x<sup>y</sup></button></div>
                <div class="col"><button class="key btn btn-light w-100 fw-semibold" data-value="7">7</button></div>
                <div class="col"><button class="key btn btn-light w-100 fw-semibold" data-value="8">8</button></div>
                <div class="col"><button class="key btn btn-light w-100 fw-semibold" data-value="9">9</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="*">&times;</button></div>

                <div class="col-12"></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="tenpow">10<sup>x</sup></button></div>
                <div class="col"><button class="key btn btn-light w-100 fw-semibold" data-value="4">4</button></div>
                <div class="col"><button class="key btn btn-light w-100 fw-semibold" data-value="5">5</button></div>
                <div class="col"><button class="key btn btn-light w-100 fw-semibold" data-value="6">6</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="-">&minus;</button></div>

                <div class="col-12"></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="log">log</button></div>
                <div class="col"><button class="key btn btn-light w-100 fw-semibold" data-value="1">1</button></div>
                <div class="col"><button class="key btn btn-light w-100 fw-semibold" data-value="2">2</button></div>
                <div class="col"><button class="key btn btn-light w-100 fw-semibold" data-value="3">3</button></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="+">+</button></div>

                <div class="col-12"></div>
                <div class="col"><button class="key btn btn-light w-100" data-value="ln">ln</button></div>
                <div class="col"><button class="key btn btn-light w-100 fw-semibold" data-value="±"><sup>+</sup>/<sub>-</sub></button></div>
                <div class="col"><button class="key btn btn-light w-100 fw-semibold" data-value="0">0</button></div>
                <div class="col"><button class="key btn btn-light w-100 fw-semibold" data-value=".">.</button></div>
                <div class="col"><button class="key w-100 btn text-primary fw-semibold" style="background:#cce5ff;" data-value="=">=</button></div>
            </div>
        </div>
        <div class="px-2 pb-2 border-top">
            <div class="d-flex gap-2 pt-2">
                <button class="btn btn-outline-secondary btn-sm" id="toggleHistory">Show / Hide History</button>
                <button class="btn btn-outline-danger btn-sm" id="clearHistory">Clear History</button>
            </div>
            <div id="history-box" style="display:none; max-height:150px; overflow-y:auto;" class="border rounded p-2 bg-light mt-2">
                <ul id="history-list" class="list-unstyled mb-0 small">
                    <li class="text-muted">No history yet.</li>
                </ul>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="script.js"></script>
</body>

</html>
